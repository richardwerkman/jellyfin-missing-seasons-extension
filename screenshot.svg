<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440">
  <defs>
    <filter id="grayscale">
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#1e1e3a"/>
    </linearGradient>
    <linearGradient id="poster1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c59"/>
      <stop offset="100%" stop-color="#2d5a3f"/>
    </linearGradient>
    <linearGradient id="poster2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#5a4510"/>
    </linearGradient>
    <linearGradient id="poster3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b2d5b"/>
      <stop offset="100%" stop-color="#4a1d3f"/>
    </linearGradient>
    <linearGradient id="poster4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e5090"/>
      <stop offset="100%" stop-color="#1a3560"/>
    </linearGradient>
    <linearGradient id="poster5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#903030"/>
      <stop offset="100%" stop-color="#601a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="440" fill="url(#bg)" rx="12"/>

  <!-- Header -->
  <text x="40" y="50" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Breaking Bad</text>
  <text x="40" y="78" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#00a4dc">Seasons</text>

  <!-- Season 1 - Available -->
  <g transform="translate(40, 100)">
    <rect width="175" height="262" rx="6" fill="url(#poster1)"/>
    <text x="87" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="rgba(255,255,255,0.15)">1</text>
    <!-- Play button overlay -->
    <circle cx="87" cy="131" r="22" fill="rgba(0,0,0,0.5)" stroke="white" stroke-width="1.5"/>
    <polygon points="80,120 80,142 98,131" fill="white"/>
    <rect y="262" width="175" height="53" rx="0" fill="#1e1e3a"/>
    <text x="87" y="284" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Season 1</text>
    <text x="87" y="303" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">7 Episodes</text>
  </g>

  <!-- Season 2 - Available -->
  <g transform="translate(235, 100)">
    <rect width="175" height="262" rx="6" fill="url(#poster2)"/>
    <text x="87" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="rgba(255,255,255,0.15)">2</text>
    <circle cx="87" cy="131" r="22" fill="rgba(0,0,0,0.5)" stroke="white" stroke-width="1.5"/>
    <polygon points="80,120 80,142 98,131" fill="white"/>
    <rect y="262" width="175" height="53" rx="0" fill="#1e1e3a"/>
    <text x="87" y="284" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Season 2</text>
    <text x="87" y="303" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">13 Episodes</text>
  </g>

  <!-- Season 3 - Available -->
  <g transform="translate(430, 100)">
    <rect width="175" height="262" rx="6" fill="url(#poster3)"/>
    <text x="87" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="rgba(255,255,255,0.15)">3</text>
    <circle cx="87" cy="131" r="22" fill="rgba(0,0,0,0.5)" stroke="white" stroke-width="1.5"/>
    <polygon points="80,120 80,142 98,131" fill="white"/>
    <rect y="262" width="175" height="53" rx="0" fill="#1e1e3a"/>
    <text x="87" y="284" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Season 3</text>
    <text x="87" y="303" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">13 Episodes</text>
  </g>

  <!-- Season 4 - MISSING (grayed out) -->
  <g transform="translate(625, 100)" opacity="0.4" filter="url(#grayscale)">
    <rect width="175" height="262" rx="6" fill="url(#poster4)"/>
    <text x="87" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="rgba(255,255,255,0.15)">4</text>
    <!-- "Not available" badge -->
    <rect x="60" y="8" width="108" height="22" rx="3" fill="rgba(0,0,0,0.75)"/>
    <text x="114" y="23" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#cccccc" letter-spacing="0.5">NOT AVAILABLE</text>
    <rect y="262" width="175" height="53" rx="0" fill="#1e1e3a"/>
    <text x="87" y="284" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Season 4</text>
    <text x="87" y="303" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">13 Episodes</text>
  </g>

  <!-- Season 5 - MISSING (grayed out) -->
  <g transform="translate(820, 100)" opacity="0.4" filter="url(#grayscale)">
    <rect width="175" height="262" rx="6" fill="url(#poster5)"/>
    <text x="87" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="60" font-weight="700" fill="rgba(255,255,255,0.15)">5</text>
    <!-- "Not available" badge -->
    <rect x="60" y="8" width="108" height="22" rx="3" fill="rgba(0,0,0,0.75)"/>
    <text x="114" y="23" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#cccccc" letter-spacing="0.5">NOT AVAILABLE</text>
    <rect y="262" width="175" height="53" rx="0" fill="#1e1e3a"/>
    <text x="87" y="284" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#e0e0e0">Season 5</text>
    <text x="87" y="303" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">16 Episodes</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 405)">
    <rect width="12" height="12" rx="2" fill="#4a7c59"/>
    <text x="20" y="11" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">Available in library</text>
    <rect x="170" width="12" height="12" rx="2" fill="#555555" opacity="0.4"/>
    <text x="190" y="11" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#888888">Missing (grayed out, not clickable)</text>
  </g>
</svg>
